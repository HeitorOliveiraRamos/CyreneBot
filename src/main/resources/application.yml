spring:
  application:
    name: cyrene-bot
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://localhost:5432/cyrene
    username: ${DB_USER:cyrene}
    password: ${DB_PASSWORD:cyrene}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          # NOTE: For Discord tool calling to work, MODEL_NAME must be a tool-capable
          # Ollama model. Verified options include: llama3.1, llama3.2, qwen2.5,
          # qwen2.5-coder, mistral-nemo, mistral-small, granite3-dense.
          # Plain `llama3` does NOT support tools and will cause tool-aware chats to
          # fall back to text-only behavior.
          model: ${MODEL_NAME:llama3.1}
      # Embedding model for the RAG knowledge base. Pull it once: `ollama pull nomic-embed-text`.
      # nomic-embed-text outputs 768-dim vectors — this MUST match pgvector.dimensions below.
      # If you swap to a different embed model (e.g. mxbai-embed-large = 1024), update both.
      embedding:
        options:
          model: ${EMBED_MODEL_NAME:nomic-embed-text}
    vectorstore:
      pgvector:
        # Spring AI creates the `vector_store` table + HNSW index on first start.
        # The `vector` extension itself is created by Flyway (V10__pgvector.sql) beforehand.
        initialize-schema: true
        dimensions: ${PGVECTOR_DIMS:768}
        index-type: HNSW
        distance-type: COSINE_DISTANCE

bot:
  token: ${BOT_TOKEN}
  personality-file: ${BOT_PERSONALITY_FILE:classpath:prompts/cyrene-personality.md}
  # Default Ollama model used by legacy single-pass paths (e.g. /contexto-do-canal).
  # MUST be tool-capable (llama3.1, llama3.2, qwen2.5, mistral-nemo, etc.) —
  # plain `llama3` does NOT support tools.
  model-name: ${MODEL_NAME:llama3.1}
  # Brain pass: decides tool calls and produces a factual, neutral description of
  # what was done. MUST be tool-capable.
  brain-model-name: ${BRAIN_MODEL_NAME:llama3.1}
  # Voice pass: rewrites the brain's output as Cyrene in persona. No tool callbacks
  # are attached to this pass.
  voice-model-name: ${VOICE_MODEL_NAME:llama3.1}
  # Ollama inference tuning. These are applied at every call site by OllamaAiService
  # because per-prompt OllamaOptions replace Spring AI's chat.options defaults.
  # num-ctx default (16384) is sized for the knowledge path's web-fetch budget (see
  # web-fetch-char-limit below); a smaller ctx silently truncates fetched page text and
  # clips kit numbers. Lower it only if memory-constrained and not using deep web fetches —
  # larger ctx grows the KV cache.
  performance:
    num-ctx: ${OLLAMA_NUM_CTX:16384}
    num-predict: ${OLLAMA_NUM_PREDICT:512}
    num-thread: ${OLLAMA_NUM_THREAD:8}
    # Max reply pipelines allowed to hit Ollama concurrently. A single local Ollama
    # serializes requests, so a burst of mentions otherwise piles up and slows every reply.
    # When full, extra mentions get an immediate "busy" reply. Raise only if Ollama runs
    # with real parallelism (OLLAMA_NUM_PARALLEL) and the host has the memory for it.
    max-concurrent-inferences: ${OLLAMA_MAX_CONCURRENT:2}
    # Token budget for the knowledge path (HSR brain extraction + persona retelling).
    # A full kit + its persona rewrite blows past num-predict (512), which is sized for
    # one-line moderation confirmations. Only a ceiling — short replies still stop early.
    knowledge-num-predict: ${OLLAMA_KNOWLEDGE_NUM_PREDICT:2048}
    # Brain pass + intent gate are classification-like: keep sampling tight so the model
    # doesn't hallucinate tool calls on a greeting.
    brain-temperature: ${OLLAMA_BRAIN_TEMP:0.1}
    brain-top-p: ${OLLAMA_BRAIN_TOP_P:0.5}
    # Voice pass is prose: a bit warmer for natural persona. Drop toward 0.5 if it drifts.
    voice-temperature: ${OLLAMA_VOICE_TEMP:0.8}
  reply:
    cooldown-seconds: 5
    # Reply-chain walker: reconstructs the Discord reply thread leading up to a mention so
    # the back-and-forth carries context into the LLM prompt without persisting anything.
    # A fresh @mention has no reply pointer, so it starts clean — separate threads never
    # mix. Hop 1 is free (inline with the event); deeper hops use an in-memory cache of
    # BOTH Cyrene's replies and the human messages she answered, falling back to REST only
    # on a cold cache (restart). max-hops is high because cache hits are ~free; budget-ms
    # only bounds the cold-cache REST case; cache-ttl covers long, slow threads.
    chain:
      max-hops: ${REPLY_CHAIN_MAX_HOPS:50}
      budget-ms: ${REPLY_CHAIN_BUDGET_MS:800}
      cache-ttl-minutes: ${REPLY_CHAIN_CACHE_TTL_MIN:120}
      cache-max-size: ${REPLY_CHAIN_CACHE_MAX:2000}
  message:
    max-length: 2000
    can-mention-here-and-everyone: false
  context:
    history-fetch-size: 50
  # When set, message listeners only respond in this channel — used to scope the bot
  # to a staging channel during local testing. Leave blank/unset to listen everywhere.
  test-channel-id: ${TEST_CHANNEL_ID:}

  # Honkai: Star Rail knowledge base (RAG). Feeds the lookupHsr / searchWeb tools.
  knowledge:
    # When true, the ingestion runner wipes `vector_store` and re-embeds everything from
    # nanoka on startup, then the bot continues normally. Leave false in production — flip it
    # on for a single run after a new patch:
    #   HSR_REINDEX=true java -jar cyrene-bot.jar    (or mvn spring-boot:run)
    reindex: ${HSR_REINDEX:false}
    # nanoka.cc data source for the reindex (structured JSON, no scraping). The patch version
    # is auto-discovered from the home page; pin it via HSR_NANOKA_VERSION to freeze a patch.
    nanoka-home-url: ${HSR_NANOKA_HOME:https://hsr.nanoka.cc/}
    nanoka-cdn-url: ${HSR_NANOKA_CDN:https://static.nanoka.cc/hsr}
    nanoka-version: ${HSR_NANOKA_VERSION:}
    # How many documents to embed+insert per batch during ingestion. Lower if Ollama
    # times out on big batches; raise to go faster.
    batch-size: ${HSR_INGEST_BATCH:64}
    # How many knowledge chunks lookupHsr returns to the brain pass per query.
    top-k: ${HSR_TOP_K:5}
    # Minimum cosine similarity (0..1) for a chunk to be considered relevant. Below this,
    # lookupHsr reports "nothing found" so the brain can fall back to searchWeb.
    similarity-threshold: ${HSR_SIM_THRESHOLD:0.55}
    # Self-hosted SearXNG JSON endpoint for the web-search fallback. Set to empty to disable
    # web search (lookupHsr still works). Web search is half the anti-hallucination net —
    # when a character isn't in the local base, this is the only thing that grounds the answer.
    searxng-url: ${SEARXNG_URL:http://localhost:8888}
    # How many of the top web results to open and read in full (page text), not just the
    # short SearXNG snippet — this is what makes leaked/older kits actually answerable.
    # 0 = snippets only. Kept low (2): better to read few pages deeply than many shallowly
    # (wiki pages bury the kit ~14k chars in); snippets still return for ALL results.
    web-fetch-pages: ${HSR_WEB_FETCH_PAGES:2}
    # Per-page character cap on extracted text fed to the model (bounds the context window).
    # Large on purpose — on game8-style pages the ability multipliers don't appear until
    # ~14–16k chars in, after the table-of-contents/ratings preamble. Lower if num-ctx is small.
    web-fetch-char-limit: ${HSR_WEB_FETCH_CHARS:18000}
    # Verify web-sourced HSR answers against the fetched page text with a cheap LLM judge
    # before sending (one short round-trip per web answer; local-KB answers skip it). Set
    # false to drop the judge if web replies feel slow and you trust deterministic grounding.
    verify-web-answers: ${HSR_VERIFY_WEB:true}

logging:
  level:
    root: INFO
    com.cyrene: DEBUG
    net.dv8tion.jda: INFO
