spring:
  application:
    name: cyrene-bot
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://localhost:5432/cyrene
    username: ${DB_USER:cyrene}
    password: ${DB_PASSWORD:cyrene}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          # NOTE: For Discord tool calling to work, MODEL_NAME must be a tool-capable
          # Ollama model. Verified options include: llama3.1, llama3.2, qwen2.5,
          # qwen2.5-coder, mistral-nemo, mistral-small, granite3-dense.
          # Plain `llama3` does NOT support tools and will cause tool-aware chats to
          # fall back to text-only behavior.
          model: ${MODEL_NAME:llama3.1}

bot:
  token: ${BOT_TOKEN}
  personality-file: ${BOT_PERSONALITY_FILE:classpath:prompts/cyrene-personality.md}
  # Default Ollama model used by legacy single-pass paths (e.g. /contexto-do-canal).
  # MUST be tool-capable (llama3.1, llama3.2, qwen2.5, mistral-nemo, etc.) —
  # plain `llama3` does NOT support tools.
  model-name: ${MODEL_NAME:llama3.1}
  # Brain pass: decides tool calls and produces a factual, neutral description of
  # what was done. MUST be tool-capable.
  brain-model-name: ${BRAIN_MODEL_NAME:llama3.1}
  # Voice pass: rewrites the brain's output as Cyrene in persona. No tool callbacks
  # are attached to this pass.
  voice-model-name: ${VOICE_MODEL_NAME:llama3.1}
  # Ollama inference tuning. These are applied at every call site by OllamaAiService
  # because per-prompt OllamaOptions replace Spring AI's chat.options defaults.
  # Raise num-ctx only if prompts are actually long — larger ctx grows the KV cache.
  performance:
    num-ctx: ${OLLAMA_NUM_CTX:4096}
    num-predict: ${OLLAMA_NUM_PREDICT:512}
    num-thread: ${OLLAMA_NUM_THREAD:8}
    # Brain pass + intent gate are classification-like: keep sampling tight so the model
    # doesn't hallucinate tool calls on a greeting.
    brain-temperature: ${OLLAMA_BRAIN_TEMP:0.1}
    brain-top-p: ${OLLAMA_BRAIN_TOP_P:0.5}
    # Voice pass is prose: a bit warmer for natural persona. Drop toward 0.5 if it drifts.
    voice-temperature: ${OLLAMA_VOICE_TEMP:0.8}
  reply:
    cooldown-seconds: 5
    # Reply-chain walker: reconstructs the Discord reply thread leading up to a mention so
    # multi-user back-and-forth carries context into the LLM prompt without persisting
    # anything. Hop 1 is free (Discord ships it inline with the gateway event); deeper
    # hops use an in-memory cache of bot-authored messages and fall back to REST.
    chain:
      max-hops: ${REPLY_CHAIN_MAX_HOPS:10}
      budget-ms: ${REPLY_CHAIN_BUDGET_MS:400}
      cache-ttl-minutes: ${REPLY_CHAIN_CACHE_TTL_MIN:30}
      cache-max-size: ${REPLY_CHAIN_CACHE_MAX:2000}
  message:
    max-length: 2000
    can-mention-here-and-everyone: false
  context:
    history-fetch-size: 50
  # Rolling per-(user, channel) context for the @-mention reply path (MentionContextService).
  # Lets the bot remember its own follow-up questions ("por quanto tempo?") so the next
  # mention from the same user completes the action instead of starting from zero.
  mention-context:
    max-messages: ${MENTION_CTX_MAX:10}
    recency-minutes: ${MENTION_CTX_RECENCY_MIN:30}
    retention-hours: ${MENTION_CTX_RETENTION_H:24}
  # Cached per-(user, guild) profile populated on first @-mention so the brain doesn't
  # have to call getCallerInfo / getCallerModerationPermissions on every interaction.
  # A daily cron refreshes name/role/permissions; personality summary is regenerated
  # every N persisted exchanges.
  user-info:
    refresh-cron: ${USER_INFO_REFRESH_CRON:0 0 4 * * *}
    personality-refresh-every-exchanges: ${USER_INFO_PERSONALITY_EVERY:10}
    personality-sample-size: ${USER_INFO_PERSONALITY_SAMPLE:10}
  # When set, message listeners only respond in this channel — used to scope the bot
  # to a staging channel during local testing. Leave blank/unset to listen everywhere.
  test-channel-id: ${TEST_CHANNEL_ID:}

logging:
  level:
    root: INFO
    com.cyrene: DEBUG
    net.dv8tion.jda: INFO
